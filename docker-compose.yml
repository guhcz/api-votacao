version: "3.8"

services:
  oracle:
    image: gvenzl/oracle-free:latest
    ports:
      - "1521:1521"
    environment:
      ORACLE_PASSWORD: Oracle#123
      APP_USER: VOTACAO
      APP_USER_PASSWORD: Votacao#123
    volumes:
      - oracle-volume:/opt/oracle/oradata
    healthcheck:
      test: ["CMD", "healthcheck.sh"]
      interval: 10s
      timeout: 5s
      retries: 20

  vault:
    image: hashicorp/vault:1.16
    container_name: vault
    ports:
      - "8200:8200"
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: root
      VAULT_DEV_LISTEN_ADDRESS: "0.0.0.0:8200"
    cap_add:
      - IPC_LOCK
    command: vault server -dev
    healthcheck:
      test: [ "CMD", "wget", "-qO-", "http://127.0.0.1:8200/v1/sys/health" ]
      interval: 5s
      timeout: 3s
      retries: 20

  api:
    build: .
    ports:
      - "8083:8080"
    depends_on:
      oracle:
        condition: service_healthy
      vault:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: "oracle"
      SPRING_DATASOURCE_URL: "jdbc:oracle:thin:@oracle:1521/FREEPDB1"

      SPRING_CONFIG_IMPORT: "vault://"

      SPRING_CLOUD_VAULT_ENABLED: "true"
      SPRING_CLOUD_VAULT_URI: "http://vault:8200"
      SPRING_CLOUD_VAULT_AUTHENTICATION: "TOKEN"
      SPRING_CLOUD_VAULT_TOKEN: "root"

      SPRING_CLOUD_VAULT_KV_ENABLED: "true"
      SPRING_CLOUD_VAULT_KV_BACKEND: "secret"
      SPRING_CLOUD_VAULT_KV_BACKEND_VERSION: "2"
      SPRING_CLOUD_VAULT_KV_DEFAULT_CONTEXT: "application"
      SPRING_CLOUD_VAULT_KV_APPLICATION_NAME: "votacao"


volumes:
  oracle-volume: