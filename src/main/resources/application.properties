spring.config.import=vault://

spring.cloud.vault.uri=http://127.0.0.1:8200
spring.cloud.vault.authentication=TOKEN
spring.cloud.vault.token=root
#spring.cloud.vault.host=vault
#spring.cloud.vault.port=8200

spring.cloud.vault.kv.enabled=true
spring.cloud.vault.kv.backend=secret
spring.cloud.vault.kv.application-name=votacao
spring.cloud.vault.kv.version=2
spring.cloud.vault.kv.default-context=application


logging.level.org.springframework.cloud.vault=DEBUG
logging.level.org.springframework.vault=DEBUG

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false
debug=true

spring.datasource.driver-class-name=oracle.jdbc.OracleDriver
spring.datasource.url=jdbc:oracle:thin:@//localhost:1521/FREEPDB1
spring.datasource.username=${spring.datasource.username}
spring.datasource.password=${spring.datasource.password}


springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.persistAuthorization=true
springdoc.swagger-ui.doc-expansion=none

api.security.token.security=${api.security.token.security}

logging.level.org.springframework.security=DEBUG


ibge.base-url=https://servicodados.ibge.gov.br/api/v1/localidades
viacep.base-url=https://viacep.com.br

server.port=8085





